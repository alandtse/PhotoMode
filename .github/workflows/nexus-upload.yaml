# Nexus upload for PhotoMode (VR). Lean wrapper around the shared reusable workflow
# alandtse/nexus-workflows/.github/workflows/upload-nexus.yml — the same one
# FloatingSubtitles VR, imgui-vr-helper, Open Shaders, and devbench use. It downloads the
# release archive by tag, checks whether the version already exists on Nexus, and uploads
# if new.
#
# Safety: dry_run defaults to true (report only, never uploads). A real upload needs
# repo secrets UNEX_APIKEY and UNEX_NEXUSMODS_SESSION_COOKIE — then dispatch with
# dry_run=false (vr-pack.yml flips it via the NEXUS_AUTO_UPLOAD repo variable).
#
# Nexus page: https://www.nexusmods.com/skyrimspecialedition/mods/184058
name: "Nexus: Upload Release"

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Published stable release tag to upload (vX.Y.Z.W)."
        required: true
      nexus_game_id:
        description: "Nexus game ID."
        required: false
        default: "skyrimspecialedition"
      nexus_mod_id:
        description: "Photo Mode VR Nexus mod ID."
        required: false
        default: "184058"
      mod_filename:
        description: "Nexus file name (without extension)."
        required: false
        default: "Photo Mode VR"
      mod_version:
        description: "Nexus version to publish. Defaults to the tag without 'v'."
        required: false
      dry_run:
        description: "If true, only report the planned upload; never upload."
        required: false
        type: choice
        default: "true"
        options: ["true", "false"]
      changelog:
        description: "Optional changelog; defaults to the GitHub release body."
        required: false
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      nexus_game_id:
        required: false
        type: string
        default: "skyrimspecialedition"
      nexus_mod_id:
        required: false
        type: string
        default: "184058"
      mod_filename:
        required: false
        type: string
        default: "Photo Mode VR"
      mod_version:
        required: false
        type: string
        default: ""
      dry_run:
        required: false
        type: string
        default: "true"
      changelog:
        required: false
        type: string
        default: ""
    secrets:
      UNEX_NEXUSMODS_SESSION_COOKIE:
        required: false
      UNEX_APIKEY:
        required: false

# Read-only on GitHub: jobs list/download the release and write only to Nexus.
permissions:
  contents: read

jobs:
  prepare:
    name: Resolve release
    if: github.repository_owner == 'alandtse'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
      dry_run: ${{ steps.resolve.outputs.dry_run }}
      mod_id: ${{ steps.resolve.outputs.mod_id }}
      changelog: ${{ steps.body.outputs.changelog }}
    steps:
      - name: Resolve and validate tag
        id: resolve
        env:
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_MOD_ID: ${{ inputs.nexus_mod_id || '184058' }}
          INPUT_MOD_VERSION: ${{ inputs.mod_version }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="$INPUT_TAG"
          [ -n "$TAG" ] || { echo "::error::No tag provided." >&2; exit 1; }
          # Nexus only gets stable releases.
          if [[ "$TAG" == *-* ]]; then
            echo "::error::'$TAG' is a pre-release tag; only stable releases go to Nexus." >&2
            exit 1
          fi
          DRAFT=$(gh api "repos/$GITHUB_REPOSITORY/releases" \
            --jq ".[] | select(.tag_name == \"$TAG\") | .draft" 2>/dev/null | head -1)
          if [ "$DRAFT" != "false" ]; then
            echo "::error::Release '$TAG' is not published. Publish the GitHub release first." >&2
            exit 1
          fi
          DRY_RUN=$([ "$INPUT_DRY_RUN" = "false" ] && echo false || echo true)
          if [ -z "$INPUT_MOD_ID" ]; then
            echo "::error::nexus_mod_id is required." >&2
            exit 1
          fi
          # An explicitly supplied mod_version (e.g. from vr-pack.yml's verify job) is
          # already the final display version — use it as-is. Only when deriving from
          # the raw tag (manual dispatch with no mod_version) do we strip the trailing
          # VR base `.0`, so that fallback also shows the 3-part upstream version. Do
          # NOT strip an explicitly supplied version too: it may legitimately end in
          # `.0` as its own patch number (e.g. "6.4.0"), and stripping it twice drops
          # a real version digit.
          if [ -n "$INPUT_MOD_VERSION" ]; then
            VERSION="$INPUT_MOD_VERSION"
          else
            VERSION="${TAG#v}"
            VERSION="${VERSION%.0}"
          fi
          {
            echo "tag=$TAG"
            echo "version=$VERSION"
            echo "dry_run=$DRY_RUN"
            echo "mod_id=$INPUT_MOD_ID"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve changelog (release body)
        id: body
        env:
          INPUT_CHANGELOG: ${{ inputs.changelog }}
          TAG: ${{ steps.resolve.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DELIM="EOF_$(openssl rand -hex 8)"
          {
            echo "changelog<<$DELIM"
            if [ -n "$INPUT_CHANGELOG" ]; then
              printf '%s\n' "$INPUT_CHANGELOG"
            else
              gh api "repos/$GITHUB_REPOSITORY/releases/tags/$TAG" --jq '.body // ""' 2>/dev/null || true
            fi
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

  dry-run-check:
    name: Dry run — report planned upload
    needs: prepare
    if: needs.prepare.outputs.dry_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Report
        env:
          MOD_ID: ${{ needs.prepare.outputs.mod_id }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          {
            echo "## Dry Run — Nexus upload"
            echo
            echo "Would upload **PhotoMode** \`$VERSION\` to "
            echo "https://www.nexusmods.com/skyrimspecialedition/mods/${MOD_ID}"
            echo
            echo "> Set repo variable \`NEXUS_AUTO_UPLOAD=true\` and the UNEX_* secrets to upload for real."
          } >> "$GITHUB_STEP_SUMMARY"

  upload:
    name: Upload to Nexus
    needs: prepare
    if: needs.prepare.outputs.dry_run != 'true'
    uses: alandtse/nexus-workflows/.github/workflows/upload-nexus.yml@main
    with:
      nexus_game_id: ${{ inputs.nexus_game_id || 'skyrimspecialedition' }}
      nexus_mod_id: ${{ needs.prepare.outputs.mod_id }}
      tag_name: ${{ needs.prepare.outputs.tag }}
      mod_version: ${{ needs.prepare.outputs.version }}
      mod_filename: ${{ inputs.mod_filename || 'Photo Mode VR' }}
      changelog: ${{ needs.prepare.outputs.changelog }}
      file_description: |
        See Description → Requirements for installation instructions.
        PDB is for crash debugging and can be removed.
      check_existing: true
    secrets:
      UNEX_NEXUSMODS_SESSION_COOKIE: ${{ secrets.UNEX_NEXUSMODS_SESSION_COOKIE }}
      UNEX_APIKEY: ${{ secrets.UNEX_APIKEY }}
