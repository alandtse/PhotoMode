# Formatting/codegen is handled by pre-commit.ci on the fork (maintenance.yml is
# gated to the upstream repo). Game data that isn't UTF-8 source — translations and
# binary esp/pex — is excluded so the text hooks don't corrupt it.
ci:
  autofix_commit_msg: "style: auto fixes from pre-commit hooks"
  autoupdate_commit_msg: "ci: pre-commit autoupdate"
  autoupdate_schedule: monthly

exclude: |
  (?x)^(
    extern/.*|
    cmake/ports/.*|
    COPYING|
    EXCEPTIONS\.md|
    Skyrim/Data/Interface/Translations/.*|
    Skyrim/Data/.*\.(esp|pex)$
  )

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-yaml
      - id: check-added-large-files
      - id: end-of-file-fixer

  # Pinned to clang-format 16 to match upstream's formatting; keeps the fork's code
  # byte-compatible so upstream rebases don't fight formatting.
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v16.0.6
    hooks:
      - id: clang-format
        args: [--style=file]
        files: \.(h|hpp|c|cpp)$

  # pre-commit/mirrors-prettier is archived (last stable tag v3.1.0, anything newer is an
  # alpha pre-release of an archived repo); rbubley/mirrors-prettier is the maintained fork.
  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.3.3
    hooks:
      - id: prettier
        additional_dependencies: ["prettier@3.1.0"]
        files: \.(json|md|yml|yaml)$

  # Regenerate the CMake source/header lists (what maintenance.yml's ProjectGen did).
  - repo: local
    hooks:
      - id: projectgen
        name: Regenerate CMake file lists
        entry: python ProjectGen.py
        language: python
        pass_filenames: false
        files: ^(src|include)/.*\.(h|hpp|hxx|c|cpp|cxx)$
